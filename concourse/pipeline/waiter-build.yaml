jobs:
  - name: centos7
    plan:
      - in_parallel:
          limit: 2
          steps:
            - get: monograph_waiter
              trigger: true
            - get: image_centos7
      - task: build_waiter
        file: monograph_waiter/concourse/task_build.yaml
        image: image_centos7
      - put: out_s3_centos7
        params:
          file: the-output/waiter.tar.gz
    serial: true

  - name: centos8
    plan:
      - in_parallel:
          limit: 2
          steps:
            - get: monograph_waiter
            - get: image_centos8
      - task: build_waiter
        file: monograph_waiter/concourse/task_build.yaml
        image: image_centos8
      - put: out_s3_centos8
        params:
          file: the-output/waiter.tar.gz
    serial: true

  - name: ubuntu1804
    plan:
      - in_parallel:
          limit: 2
          steps:
            - get: monograph_waiter
            - get: image_ubuntu1804
      - task: build_waiter
        file: monograph_waiter/concourse/task_build.yaml
        image: image_ubuntu1804
      - put: out_s3_ubuntu1804
        params:
          file: the-output/waiter.tar.gz
    serial: true

  - name: ubuntu2004
    plan:
      - in_parallel:
          limit: 2
          steps:
            - get: monograph_waiter
              trigger: true
            - get: image_ubuntu2004
      - task: build_waiter
        file: monograph_waiter/concourse/task_build.yaml
        image: image_ubuntu2004
      - put: out_s3_ubuntu2004
        params:
          file: the-output/waiter.tar.gz
    serial: true

resources:
  - name: monograph_waiter
    icon: github
    source:
      branch: main
      private_key: ((git-key))
      uri: git@github.com:monographdb/monograph_waiter.git
    type: git

  - name: image_centos7
    source:
      repository: monographdb/rust-centos7
    type: registry-image
  - name: image_centos8
    source:
      repository: monographdb/rust-centos8
    type: registry-image
  - name: image_ubuntu1804
    source:
      repository: monographdb/rust-ubuntu1804
    type: registry-image
  - name: image_ubuntu2004
    source:
      repository: monographdb/rust-ubuntu2004
    type: registry-image

  - name: out_s3_centos7
    source:
      access_key_id: ((access-key-id))
      secret_access_key: ((secret-access-key))
      bucket: eloq-release
      region_name: ap-northeast-1
      versioned_file: waiter/waiter-centos7-amd64.tar.gz
    type: s3
  - name: out_s3_centos8
    source:
      access_key_id: ((access-key-id))
      secret_access_key: ((secret-access-key))
      bucket: eloq-release
      region_name: ap-northeast-1
      versioned_file: waiter/waiter-centos8-amd64.tar.gz
    type: s3
  - name: out_s3_ubuntu1804
    source:
      access_key_id: ((access-key-id))
      secret_access_key: ((secret-access-key))
      bucket: eloq-release
      region_name: ap-northeast-1
      versioned_file: waiter/waiter-ubuntu1804-amd64.tar.gz
    type: s3
  - name: out_s3_ubuntu2004
    source:
      access_key_id: ((access-key-id))
      secret_access_key: ((secret-access-key))
      bucket: eloq-release
      region_name: ap-northeast-1
      versioned_file: waiter/waiter-ubuntu2004-amd64.tar.gz
    type: s3
