platform: linux
image_resource:
  type: registry-image
inputs:
  - name: monograph_waiter
params:
  PIPELINE: ""
  ADDRESS: http://13.115.58.127:8080
run:
  path: /bin/bash
  args:
    - -cxe
    - |
      export TARGET='eloq'
      curl "${ADDRESS}/api/v1/cli?arch=amd64&platform=linux" -o "fly"
      chmod +x fly
      mv fly /usr/local/bin/
      fly --target ${TARGET} login --concourse-url ${ADDRESS} --username mono --password cz123321Cz
      bash monograph_waiter/concourse/one-click.sh
