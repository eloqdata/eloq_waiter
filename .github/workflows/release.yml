name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to publish"
        required: true
        type: string
      draft:
        description: "Create the GitHub release as a draft"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build ubuntu24
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Compute release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "value=main-$(date -u +%Y%m%d)-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: protobuf-compiler pkg-config libssl-dev
          version: release-ubuntu24-v1

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-21

      - name: Cache Cargo registry (downloaded crates)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          shared-key: release-ubuntu24
          cache-on-failure: true

      - name: Build release tarball
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.value }}
          TARGET_OS_ID: ubuntu24
          TARGET_ARCH: amd64
        run: |
          chmod +x scripts/build-release-tarball.sh
          scripts/build-release-tarball.sh

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ubuntu24-amd64
          path: dist/*.tar.gz
          if-no-files-found: error

    outputs:
      release_tag: ${{ steps.tag.outputs.value }}
      prerelease: ${{ steps.tag.outputs.prerelease }}

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          files: dist/*.tar.gz
          overwrite_files: true
          prerelease: ${{ needs.build.outputs.prerelease == 'true' }}
          draft: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.draft == 'true' }}
          generate_release_notes: true
