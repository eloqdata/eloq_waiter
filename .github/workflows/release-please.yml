name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      release_tag: ${{ steps.release.outputs.tag_name }}
      release_sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: false

  build-release-assets:
    name: Build Release Assets
    runs-on: ubuntu-24.04
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}

    steps:
      - name: Checkout released commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.release_sha }}

      - name: Install build dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: protobuf-compiler pkg-config libssl-dev
          version: release-ubuntu24-v1

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-21

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          shared-key: release-ubuntu24
          cache-on-failure: true

      - name: Build release tarball
        env:
          RELEASE_TAG: ${{ needs.release-please.outputs.release_tag }}
          TARGET_OS_ID: ubuntu24
          TARGET_ARCH: amd64
        run: |
          chmod +x scripts/build-release-tarball.sh
          scripts/build-release-tarball.sh

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ubuntu24-amd64
          path: dist/*.tar.gz
          if-no-files-found: error

  publish-release-assets:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs:
      - release-please
      - build-release-assets
    if: ${{ needs.release-please.outputs.release_created == 'true' }}

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.release_tag }}
          files: dist/*.tar.gz
          overwrite_files: true
          draft: false
          prerelease: false
          generate_release_notes: false
