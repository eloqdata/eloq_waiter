[tasks.rustc-version-nightly]
toolchain = "nightly-2022-12-12"
command = "rustc"
args = ["--version"]

[env]
CARGO_MAKE_EXTEND_WORKSPACE_MAKEFILE = true
CARGO_MAKE_CRATE_IS_WORKSPACE = true
[tasks.format]
install_crate = "rustfmt"
command = "cargo"
args = ["fmt", "--", "--emit=files"]

[tasks.clean]
command = "cargo"
args = ["clean"]

[tasks.test]
command = "cargo"
args = ["test", "--tests"]
dependencies = ["clippy"]

[tasks.cluster_mgr_build]
command = "cargo"
args = ["build", "--package", "cluster_mgr", "--release"]
dependencies = ["format"]

[tasks.devtools_build]
command = "cargo"
args = ["build", "--package", "devtools", "--release"]
dependencies = ["format"]

[tasks.rest_api_build]
command = "cargo"
args = ["build", "--package", "rest_api", "--release"]
dependencies = ["format"]

[tasks.clippy]
command = "cargo"
args = ["clippy", "--all-targets", "--all-features", "--", "-D", "warnings"]

[tasks.devtools_pkg]
script = '''
#!/bin/bash
MONO_DIST_DIR="mono_devtools_dist"
WORKING_DIR=${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}
echo "build mono_devtools package working_dir="${WORKING_DIR}
TARGET="$WORKING_DIR"/target/release/devtools
function build_package() {
  mkdir -p "$MONO_DIST_DIR" && mkdir -p "$MONO_DIST_DIR"/config
  cp -r $WORKING_DIR/src/devtools/config/* "$MONO_DIST_DIR/config"
  cp "$TARGET" "$MONO_DIST_DIR"
}
build_package
'''
dependencies = ["devtools_build"]

[tasks.rest_api_pkg]
script = '''
#!/bin/bash
WORKSPACE_DIR=${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}
cp ${WORKSPACE_DIR}/target/release/rest_api EloqWaiter/
'''
dependencies = ["cluster_mgr_build", "rest_api_build", "cluster_mgr_pkg"]

[tasks.cluster_mgr_pkg]
script = '''
#!/bin/bash
WORKSPACE_DIR="${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}"
CLUSTER_MGR_RELEASE=${WORKSPACE_DIR}/target/release/cluster_mgr
echo "cluster_mgr_pkg.workspace = ${WORKSPACE_DIR}"
mkdir -p EloqWaiter
cd EloqWaiter
../version.sh > version
cp -r ${WORKSPACE_DIR}/src/cluster_mgr/config ./
cp -r ${WORKSPACE_DIR}/tests ./
cp "$CLUSTER_MGR_RELEASE" ./
if [ ! -f eloqmgr ]; then
  ln -s cluster_mgr eloqmgr
fi
'''
dependencies = ["cluster_mgr_build"]
