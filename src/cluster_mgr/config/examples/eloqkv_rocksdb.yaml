connection:
  username: "${USER}"
  auth_type: "keypair"
  auth:
    keypair: "/home/${USER}/.ssh/id_rsa"
deployment:
  cluster_name: "eloqkv-cluster-singlenode"
  product: "EloqKV"
  version: "latest"
  install_dir: "/mnt/ssd/${USER}/zhouxiao"
  enable_wal: true
  enable_io_uring: false
  checkpoint_interval: 6000
  tx_service:
    tx_host_ports: [192.168.122.24:6389]
    # enable_cache_replacement: on
    # requirepass: "asd"
    # client_port: 6389
  log_service:
    nodes:
      - host: 192.168.122.25
        port: 9000
        data_dir:
          - "/home/${USER}/eloqkv-cluster-singlenode/wal_eloqkv"
    replica: 1
    bthread_concurrency: 1
  storage_service:
    rocksdb: !LOCAL
