connection:
  username: "eloquser"
  auth_type: "keypair"
  auth:
    keypair: "/root/.ssh/id_rsa"
deployment:
  cluster_name: "test-rolling-upgrade"
  product: "EloqKV"
  version: "latest"
  install_dir: "/home/eloquser"
  enable_wal: false
  enable_io_uring: false
  checkpoint_interval: 120
  tx_service:
    tx_host_ports: [tx1:6379]
    standby_host_ports: [tx2:6379|tx3:6379]
  storage_service:
    rocksdb: !LOCAL
