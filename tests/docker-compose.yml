services:
  tx1:
    build:
      context: .
      dockerfile: Dockerfile.test
    hostname: tx1
    ports:
      - "6379:6379"
      - "16379:16379"
    networks:
      - test-net
    volumes:
      - tx1_data:/home/eloquser
      - ./ssh_keys/test_rsa.pub:/tmp/ssh_key.pub:ro

  tx2:
    build:
      context: .
      dockerfile: Dockerfile.test
    hostname: tx2
    ports:
      - "6380:6379"
      - "16380:16379"
    networks:
      - test-net
    volumes:
      - tx2_data:/home/eloquser
      - ./ssh_keys/test_rsa.pub:/tmp/ssh_key.pub:ro

  tx3:
    build:
      context: .
      dockerfile: Dockerfile.test
    hostname: tx3
    ports:
      - "6381:6379"
      - "16381:16379"
    networks:
      - test-net
    volumes:
      - tx3_data:/home/eloquser
      - ./ssh_keys/test_rsa.pub:/tmp/ssh_key.pub:ro

  runner:
    build:
      context: .
      dockerfile: Dockerfile.runner
    hostname: runner
    networks:
      - test-net
    volumes:
      - ..:/workspace:ro
      - ./ssh_keys/test_rsa:/root/.ssh/id_rsa:ro
      - runner_home:/root/.eloqctl
    working_dir: /workspace/tests
    tty: true
    stdin_open: true

networks:
  test-net:
    driver: bridge

volumes:
  tx1_data:
  tx2_data:
  tx3_data:
  runner_home:
